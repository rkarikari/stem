<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Linear Satellite Frequency Pairs</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #00ff88;
    --green-dim: #00cc66;
    --green-glow: rgba(0,255,136,0.15);
    --amber: #ffaa00;
    --cyan: #00e5ff;
    --bg: #050a06;
    --bg2: #0a110b;
    --border: #1a3320;
    --text: #a0ffcc;
    --text-dim: #4a8860;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    padding: 2rem;
    position: relative;
    overflow-x: hidden;
  }

  /* Scanline overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.08) 2px,
      rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
    z-index: 100;
  }

  /* CRT vignette */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.7) 100%);
    pointer-events: none;
    z-index: 99;
  }

  .header {
    text-align: center;
    margin-bottom: 2.5rem;
    animation: fadeIn 0.8s ease;
  }

  .header h1 {
    font-family: 'Orbitron', monospace;
    font-size: clamp(1.2rem, 3vw, 2rem);
    font-weight: 900;
    color: var(--green);
    text-shadow: 0 0 20px var(--green), 0 0 40px rgba(0,255,136,0.4);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  .header .subtitle {
    font-size: 0.75rem;
    color: var(--text-dim);
    letter-spacing: 0.3em;
    margin-top: 0.4rem;
    text-transform: uppercase;
  }

  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 0.6rem auto;
    width: 60%;
    box-shadow: 0 0 8px var(--green-glow);
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
    gap: 1.5rem;
    max-width: 1300px;
    margin: 0 auto;
  }

  .sat-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    box-shadow: 0 0 20px rgba(0,255,136,0.05), inset 0 0 30px rgba(0,0,0,0.3);
    animation: slideUp 0.6s ease both;
  }

  .sat-card:nth-child(2) { animation-delay: 0.1s; }
  .sat-card:nth-child(3) { animation-delay: 0.2s; }

  .card-header {
    padding: 0.9rem 1.2rem;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(90deg, rgba(0,255,136,0.07) 0%, transparent 100%);
    display: flex;
    align-items: baseline;
    gap: 0.8rem;
  }

  .sat-name {
    font-family: 'Orbitron', monospace;
    font-weight: 700;
    font-size: 1.1rem;
    color: var(--green);
    text-shadow: 0 0 12px rgba(0,255,136,0.6);
  }

  .sat-meta {
    font-size: 0.65rem;
    color: var(--text-dim);
    letter-spacing: 0.2em;
  }

  .magic-num {
    margin-left: auto;
    font-size: 0.65rem;
    color: var(--amber);
    opacity: 0.7;
  }

  .transponder-info {
    padding: 0.5rem 1.2rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 1.5rem;
    font-size: 0.68rem;
    color: var(--text-dim);
  }

  .transponder-info span { color: var(--cyan); }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  thead tr {
    background: rgba(0,255,136,0.04);
    border-bottom: 1px solid var(--border);
  }

  th {
    padding: 0.55rem 1rem;
    font-size: 0.62rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--text-dim);
    text-align: right;
  }

  th:first-child { text-align: left; }

  td {
    padding: 0.48rem 1rem;
    font-size: 0.85rem;
    text-align: right;
    border-bottom: 1px solid rgba(26,51,32,0.5);
    transition: background 0.15s;
  }

  td:first-child { text-align: left; color: var(--text-dim); font-size: 0.72rem; }

  tr.seed-row td {
    background: rgba(0,255,136,0.06);
    color: var(--green);
  }

  tr.seed-row td:first-child { color: var(--amber); }

  tr:hover td {
    background: rgba(0,255,136,0.04);
    color: var(--green);
  }

  .freq-up { color: var(--cyan); }
  .freq-dn { color: var(--text); }

  tr.seed-row .freq-up,
  tr.seed-row .freq-dn { color: var(--green); text-shadow: 0 0 8px rgba(0,255,136,0.5); }

  .badge {
    display: inline-block;
    font-size: 0.55rem;
    padding: 0.1rem 0.35rem;
    background: rgba(255,170,0,0.15);
    border: 1px solid rgba(255,170,0,0.3);
    color: var(--amber);
    border-radius: 2px;
    vertical-align: middle;
    margin-left: 0.3rem;
    letter-spacing: 0.1em;
  }

  .passband-bar {
    padding: 0.6rem 1.2rem;
    background: rgba(0,0,0,0.2);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 0.8rem;
    font-size: 0.62rem;
    color: var(--text-dim);
  }

  .bar-track {
    flex: 1;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    position: relative;
    overflow: visible;
  }

  .bar-fill {
    height: 100%;
    background: linear-gradient(90deg, rgba(0,200,100,0.3), var(--green));
    border-radius: 2px;
    box-shadow: 0 0 6px var(--green);
  }

  .bar-seed {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 2px;
    height: 10px;
    background: var(--amber);
    box-shadow: 0 0 4px var(--amber);
  }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

  .note {
    text-align: center;
    font-size: 0.62rem;
    color: var(--text-dim);
    margin-top: 2rem;
    letter-spacing: 0.15em;
  }

  .blink { animation: blink 1.2s step-end infinite; }
  @keyframes blink { 50% { opacity: 0; } }

  .legend {
    display: flex;
    justify-content: center;
    gap: 2rem;
    margin-bottom: 1.5rem;
    font-size: 0.65rem;
    letter-spacing: 0.15em;
  }

  .legend-item { display: flex; align-items: center; gap: 0.4rem; }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; }
</style>
</head>
<body>

<div class="header">
  <h1>Linear Transponder &mdash; Frequency Pairs</h1>
  <hr class="divider">
  <div class="subtitle">Inverting Transponder &nbsp;|&nbsp; Passband Reference &nbsp;|&nbsp; <span class="blink">&#9646;</span> LSB/USB</div>
</div>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#00e5ff"></div> Uplink (LSB)</div>
  <div class="legend-item"><div class="legend-dot" style="background:#00ff88"></div> Downlink (USB)</div>
  <div class="legend-item"><div class="legend-dot" style="background:#ffaa00"></div> Seed Pair</div>
</div>

<div class="grid" id="tables"></div>

<div class="note">All frequencies in MHz &nbsp;·&nbsp; Inverting transponder: f<sub>dn</sub> = Magic &minus; f<sub>up</sub> &nbsp;·&nbsp; Uplink LSB · Downlink USB · Doppler not applied</div>

<script>
const satellites = [
  {
    name: "RS-44",
    aka: "DOSAAF-85",
    mode: "Mode V/U",
    bw: "30 kHz",
    seed: { up: 145.964996, dn: 435.637864 },
    upRange: [145.935, 145.965],
    step: 5,
    upLabel: "145 MHz",
    dnLabel: "435 MHz",
    desc: "Inverting · LSB up · USB down"
  },
  {
    name: "AO-7",
    aka: "AMSAT-OSCAR 7",
    mode: "Mode B",
    bw: "50 kHz",
    seed: { up: 432.150000, dn: 145.950861 },
    upRange: [432.125, 432.175],
    step: 10,
    upLabel: "432 MHz",
    dnLabel: "145 MHz",
    desc: "Inverting · LSB up · USB down"
  },
  {
    name: "JO-97",
    aka: "JY1Sat",
    mode: "Mode V/U",
    bw: "20 kHz",
    seed: { up: 435.100, dn: 145.874940 },
    upRange: [435.100, 435.120],
    step: 5,
    upLabel: "435 MHz",
    dnLabel: "145 MHz",
    desc: "Inverting · LSB up · USB down",
    seedOverride: { up: 435.109880, dn: 145.865060 }
  }
];

function fmt(f) { return f.toFixed(6); }
function isSeed(up, seed) { return Math.abs(up - seed.up) < 0.0001; }

function buildPassbandBar(upRange, seedUp) {
  const pct = (seedUp - upRange[0]) / (upRange[1] - upRange[0]) * 100;
  return `
    <div class="passband-bar">
      <span>${upRange[0].toFixed(3)}</span>
      <div class="bar-track">
        <div class="bar-fill" style="width:100%"></div>
        <div class="bar-seed" style="left:${pct.toFixed(1)}%"></div>
      </div>
      <span>${upRange[1].toFixed(3)}</span>
      <span>Uplink passband</span>
    </div>`;
}

const container = document.getElementById('tables');

satellites.forEach(sat => {
  const magic = sat.seed.up + sat.seed.dn;
  const actualSeed = sat.seedOverride || sat.seed;

  // Build frequency steps
  const rows = [];
  const [lo, hi] = sat.upRange;
  const stepHz = sat.step / 1000; // in MHz

  let up = lo;
  while (up <= hi + 0.0001) {
    const dn = magic - up;
    const isS = isSeed(up, actualSeed);
    rows.push({ up, dn, seed: isS });
    up = Math.round((up + stepHz) * 1e6) / 1e6;
  }

  // Ensure seed is included
  if (!rows.some(r => r.seed)) {
    rows.push({ up: actualSeed.up, dn: actualSeed.dn, seed: true });
    rows.sort((a, b) => a.up - b.up);
  }

  const rowsHTML = rows.map(r => {
    const cls = r.seed ? ' class="seed-row"' : '';
    const badge = r.seed ? '<span class="badge">SEED</span>' : '';
    // offset from center
    const centerUp = (lo + hi) / 2;
    const offset = ((r.up - centerUp) * 1000).toFixed(1);
    const sign = r.up >= centerUp ? '+' : '';
    return `<tr${cls}>
      <td>${sign}${offset} kHz${badge}</td>
      <td class="freq-up">${fmt(r.up)}</td>
      <td class="freq-dn">${fmt(r.dn)}</td>
    </tr>`;
  }).join('');

  const card = document.createElement('div');
  card.className = 'sat-card';
  card.innerHTML = `
    <div class="card-header">
      <div class="sat-name">${sat.name}</div>
      <div class="sat-meta">${sat.aka} &nbsp;·&nbsp; ${sat.mode}</div>
      <div class="magic-num">&#931;${magic.toFixed(6)}</div>
    </div>
    <div class="transponder-info">
      <div>BW: <span>${sat.bw}</span></div>
      <div>UP: <span>${sat.upLabel}</span></div>
      <div>DN: <span>${sat.dnLabel}</span></div>
      <div>${sat.desc}</div>
    </div>
    <table>
      <thead>
        <tr>
          <th>Offset</th>
          <th>Uplink LSB (MHz)</th>
          <th>Downlink USB (MHz)</th>
        </tr>
      </thead>
      <tbody>${rowsHTML}</tbody>
    </table>
    ${buildPassbandBar(sat.upRange, actualSeed.up)}
  `;
  container.appendChild(card);
});
</script>
</body>
</html>
